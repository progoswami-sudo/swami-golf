<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinehurst Cup 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1220, #111827);
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .sub {
      text-align: center;
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #334155;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      margin-bottom: 10px;
    }

    .team {
      width: 40%;
    }

    .score {
      font-size: 40px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #fb923c;
    }

    .secondary {
      background: #3b82f6;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 3px 0;
      color: #cbd5f5;
    }

    h4 {
      margin: 10px 0 5px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="homeScreen">

    <h1>Pinehurst Cup 2026</h1>
    <div class="sub">Oct 1–4 • Courses 2, 4, 8, 9</div>

    <div class="card">
      <div class="scoreboard">
        <div class="team">
          <div>Team A</div>
          <div class="score">0</div>
        </div>

        <div>VS</div>

        <div class="team">
          <div>Team B</div>
          <div class="score">0</div>
        </div>
      </div>
    </div>

    <button onclick="showPlayerScreen()">➕ Add Player</button>
    <button class="secondary">👥 View Roster</button>
    <button class="secondary">🏌️ Start Matches</button>

  </div>

  <!-- PLAYER SCREEN -->
  <div id="playerScreen" class="hidden">

    <div class="card">
      <h3>Create Player Profile</h3>

      <input id="playerName" placeholder="Player Name" />
      <input id="nickname" placeholder="Nickname (e.g. Sand Trap King)" />

      <h4>Strengths</h4>
      <div id="strengths"></div>

      <h4>Weaknesses</h4>
      <div id="weaknesses"></div>

      <button onclick="savePlayerProfile()">Save Player</button>
      <button class="secondary" onclick="goHome()">← Back Home</button>
    </div>

  </div>

</div>

<script>

/* ================= NAVIGATION ================= */

function showPlayerScreen() {
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("playerScreen").classList.remove("hidden");
}

function goHome() {
  document.getElementById("playerScreen").classList.add("hidden");
  document.getElementById("homeScreen").classList.remove("hidden");
}

/* ================= MIXED TRAITS ================= */

const strengths = [
  "Driver Accuracy",
  "Beer Consistency",
  "Iron Play",
  "Trash Talk Volume",
  "Short Game",
  "Cart Navigation Skills",
  "Putting",
  "Snack Management",
  "Mental Toughness",
  "Emergency Ball Finder",
  "Course Management",
  "Clubhouse Reputation",
  "One Good Shot Per Hole"
];

const weaknesses = [
  "3-Putt Specialist",
  "Lost GPS Reliance",
  "Slice Machine",
  "Rules Lawyer (Always Wrong)",
  "Hook Under Pressure",
  "Slow Play Offender",
  "Bunker Magnet",
  "One More Swing Syndrome",
  "Driver Chaos",
  "Ball Disappearance Expert",
  "Par 5 Overconfidence",
  "Fairway Loss Specialist"
];

/* ================= RENDER ================= */

function render(list, id) {
  const el = document.getElementById(id);

  list.forEach(item => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
    el.appendChild(label);
  });
}

render(strengths, "strengths");
render(weaknesses, "weaknesses");

/* ================= SAVE ================= */

function savePlayerProfile() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  function getSelected(id) {
    return Array.from(document.querySelectorAll(`#${id} input:checked`))
      .map(e => e.value);
  }

  const player = {
    name,
    nickname,
    strengths: getSelected("strengths"),
    weaknesses: getSelected("weaknesses")
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert(`${name} added to Pinehurst Cup 🏌️‍♂️`);

  goHome();
}

</script>

</body>
</html>
