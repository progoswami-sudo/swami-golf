<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>

    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;

      /* EXACT original gradient behavior */
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;

      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
      min-height: 100vh;
    }

    /* LOGO */

    .logo {
      display: flex;
      justify-content: center;
      margin: 20px 0 28px;
    }

    .logo-img {
      max-width: 260px;
      width: 100%;
    }

    /* TILE */

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(18, 35, 63, 0.9);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }

    /* SCOREBOARD */

    .scoreboard {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-top: 10px;
      gap: 15px;
      align-items: center;
    }

    .team-name {
      cursor: pointer;
      font-weight: bold;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .score {
      font-size: 44px;
      font-weight: bold;
    }

    /* BUTTONS */

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #334155;
    }

    /* ICONS */

    .gear {
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    /* INPUT */

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    h2 {
      text-align: center;
    }

    h4 {
      margin: 16px 0 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    /* TRAITS GRID */

    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .trait-card {
      padding: 14px 10px;
      border-radius: 10px;
      border: 1px solid #2b3d5c;
      background: #0f1b33;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trait-card.selected {
      background: #2563eb;
      border-color: #60a5fa;
    }

    .player-row {
      padding: 15px;
      border-radius: 12px;
      background: #0f1b33;
      border: 1px solid #2b3d5c;
      margin-top: 10px;
      cursor: pointer;
    }

    .player-name {
      font-size: 17px;
      font-weight: bold;
    }

    .player-detail {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 4px;
      line-height: 1.35;
    }

    .empty-state {
      color: #cbd5e1;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->

  <div id="appHome">

    <div class="logo">
      <img src="/Swami Golf Logo.png" class="logo-img">
    </div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>

  </div>

  <!-- TRIP -->

  <div id="tripHome" class="hidden">

    <div style="position:relative;">

      <div class="homeBtn" onclick="goHome()">🏠</div>

      <div class="gear" onclick="openSettings()">⚙️</div>

      <h2>Pinehurst 2026</h2>

      <div class="card">

        <div class="scoreboard">

          <div>
            <div id="teamAName"
                 class="team-name"
                 onclick="openTeamRoster('A')">
              Team A
            </div>

            <div class="score">0</div>
          </div>

          <div>VS</div>

          <div>
            <div id="teamBName"
                 class="team-name"
                 onclick="openTeamRoster('B')">
              Team B
            </div>

            <div class="score">0</div>
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- TEAM ROSTER -->

  <div id="teamRosterScreen" class="hidden">

    <h2 id="teamRosterTitle">Team Roster</h2>

    <div class="card">

      <div id="teamRosterList"></div>

      <button onclick="goTripHome()" class="secondary">
        Back
      </button>

    </div>

  </div>

  <!-- SETTINGS -->

  <div id="settingsScreen" class="hidden">

    <h2>Settings</h2>

    <div class="card">

      <button onclick="openTeamEdit()">
        Edit Team Names
      </button>

      <button onclick="openPlayerList()">
        Add / Edit Players
      </button>

      <button onclick="goTripHome()" class="secondary">
        Back
      </button>

    </div>

  </div>

  <!-- TEAM EDIT -->

  <div id="teamScreen" class="hidden">

    <h2>Team Names</h2>

    <div class="card">

      <input id="teamAInput"
             placeholder="Team A Name"/>

      <input id="teamBInput"
             placeholder="Team B Name"/>

      <button onclick="saveTeams()">
        Save
      </button>

      <button onclick="openSettings()" class="secondary">
        Back
      </button>

    </div>

  </div>

  <!-- PLAYER LIST -->

  <div id="playerListScreen" class="hidden">

    <h2>Players</h2>

    <div class="card">

      <button onclick="openPlayer()">
        Add New Player
      </button>

      <div id="playerList"></div>

      <button onclick="openSettings()" class="secondary">
        Back
      </button>

    </div>

  </div>

  <!-- PLAYER PROFILE -->

  <div id="playerScreen" class="hidden">

    <h2 id="playerScreenTitle">
      Player Profile
    </h2>

    <div class="card">

      <input id="playerName"
             placeholder="Name"/>

      <input id="nickname"
             placeholder="Nickname"/>

      <select id="playerTeam">
        <option value="">
          Assign to Team
        </option>
      </select>

      <h4>Strengths</h4>

      <div id="strengths"
           class="traits-grid"></div>

      <h4>Weaknesses</h4>

      <div id="weaknesses"
           class="traits-grid"></div>

      <button onclick="savePlayer()">
        Save Player
      </button>

      <button onclick="openPlayerList()"
              class="secondary">
        Back to Player List
      </button>

    </div>

  </div>

</div>

<script>

/* Existing JavaScript unchanged */

let editingPlayerIndex = null;

function show(id) {
  [
    "appHome",
    "tripHome",
    "teamRosterScreen",
    "settingsScreen",
    "teamScreen",
    "playerListScreen",
    "playerScreen"
  ].forEach(x =>
    document.getElementById(x)
      .classList.add("hidden")
  );

  document.getElementById(id)
    .classList.remove("hidden");
}

function openTripHome(){
  show("tripHome");
  loadTeams();
}

function goHome(){
  show("appHome");
}

function openSettings(){
  show("settingsScreen");
}

function goTripHome(){
  show("tripHome");
  loadTeams();
}

function openTeamEdit(){
  show("teamScreen");
  loadInputs();
}

function openPlayerList(){
  show("playerListScreen");
  renderPlayerList();
}

function openPlayer(index = null){
  editingPlayerIndex = index;
  show("playerScreen");
  renderTraits();
  loadTeamDropdown();

  if (index === null) {
    document.getElementById(
      "playerScreenTitle"
    ).innerText = "Add Player";

    resetPlayerForm();
  }
  else {
    document.getElementById(
      "playerScreenTitle"
    ).innerText = "Edit Player";

    loadPlayerForEdit(index);
  }
}

/* Remaining JS unchanged */

</script>

</body>
</html>
