<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      background-attachment: fixed;
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin: 10px 0 20px;
    }

    .logo-img {
      max-width: 160px;
      width: 100%;
    }

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(18, 35, 63, 0.9);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-top: 10px;
      gap: 15px;
      align-items: center;
    }

    .team-name {
      cursor: pointer;
      font-weight: bold;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .score {
      font-size: 44px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #334155;
    }

    .gear {
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    h2 { text-align: center; }

    h4 {
      margin: 16px 0 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .trait-card {
      padding: 14px 10px;
      border-radius: 10px;
      border: 1px solid #2b3d5c;
      background: #0f1b33;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trait-card.selected {
      background: #2563eb;
      border-color: #60a5fa;
    }

    .player-row {
      padding: 15px;
      border-radius: 12px;
      background: #0f1b33;
      border: 1px solid #2b3d5c;
      margin-top: 10px;
      cursor: pointer;
    }

    .player-name {
      font-size: 17px;
      font-weight: bold;
    }

    .player-detail {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 4px;
      line-height: 1.35;
    }

    .empty-state {
      color: #cbd5e1;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }
  </style>
</head>
