<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinehurst Cup 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1220, #111827);
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .sub {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      color: #cbd5f5;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    h4 {
      margin-bottom: 5px;
      margin-top: 10px;
      font-size: 14px;
      color: #e2e8f0;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 3px 0;
      color: #cbd5f5;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #fb923c;
    }

    .small {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Pinehurst Cup 2026</h1>
  <div class="sub">
    Oct 1–4 • Courses 2, 4, 8, 9 • Trash Talk Edition
  </div>

  <!-- PLAYER PROFILE -->
  <div class="card">
    <h3>Create Player Profile</h3>

    <input id="playerName" placeholder="Player Name" />
    <input id="nickname" placeholder="Nickname (e.g. Sand Trap King)" />

    <h4>🏌️ Golf Strengths (pick up to 3)</h4>
    <div id="golfStrengths"></div>

    <h4>🍻 Funny Strengths (pick up to 3)</h4>
    <div id="funStrengths"></div>

    <h4>🏌️ Golf Weaknesses (pick up to 3)</h4>
    <div id="golfWeaknesses"></div>

    <h4>😂 Funny Weaknesses (pick up to 3)</h4>
    <div id="funWeaknesses"></div>

    <button onclick="savePlayerProfile()">Add Player</button>
    <div class="small">These will power future trash talk generation 😈</div>
  </div>

</div>

<script>
/* ---------------- TRAIT DATA ---------------- */

const golfStrengths = [
  "Driver Accuracy", "Iron Play", "Short Game", "Putting",
  "Sand Play", "Mental Toughness", "Course Management",
  "One Good Shot Per Hole"
];

const funnyStrengths = [
  "Beer Consistency", "Cart Navigation Skills", "Trash Talk Volume",
  "Snack Management", "Group Text Responsiveness",
  "Emergency Ball Finder", "Clubhouse Reputation"
];

const golfWeaknesses = [
  "3-Putt Specialist", "Slice Machine", "Hook Under Pressure",
  "Bunker Magnet", "Driver Chaos", "Par 5 Overconfidence"
];

const funnyWeaknesses = [
  "Lost GPS Reliance", "Rules Lawyer (Always Wrong)", "Slow Play Offender",
  "One More Swing Syndrome", "Ball Disappearance Expert",
  "Fairway Loss Specialist"
];

/* ---------------- RENDER CHECKBOXES ---------------- */

function renderTraits(list, containerId) {
  const container = document.getElementById(containerId);

  list.forEach(item => {
    const label = document.createElement("label");
    label.innerHTML = `
      <input type="checkbox" value="${item}" />
      ${item}
    `;
    container.appendChild(label);
  });
}

renderTraits(golfStrengths, "golfStrengths");
renderTraits(funnyStrengths, "funStrengths");
renderTraits(golfWeaknesses, "golfWeaknesses");
renderTraits(funnyWeaknesses, "funWeaknesses");

/* ---------------- SAVE PLAYER ---------------- */

function savePlayerProfile() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  function getSelected(containerId) {
    return Array.from(
      document.querySelectorAll(`#${containerId} input:checked`)
    ).map(el => el.value);
  }

  const player = {
    name,
    nickname,
    golfStrengths: getSelected("golfStrengths"),
    funnyStrengths: getSelected("funStrengths"),
    golfWeaknesses: getSelected("golfWeaknesses"),
    funnyWeaknesses: getSelected("funWeaknesses")
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert(`Added ${name} to Pinehurst Cup roster 🏌️‍♂️🔥`);

  document.getElementById("playerName").value = "";
  document.getElementById("nickname").value = "";
}

</script>

</body>
</html>
