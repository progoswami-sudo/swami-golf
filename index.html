<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: #0d1b35;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at top, #21436f 0%, #0d1b35 72%);
      background-repeat: no-repeat;
      background-size: cover;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
      min-height: 100vh;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin: 20px 0 28px;
    }

    .logo-img {
      max-width: 260px;
      width: 100%;
    }

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #18345c, #13294d);
      border: 1px solid #375984;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(24, 52, 92, 0.88);
      border: 1px solid #375984;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }

    .page-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 19.92px 0;
      min-height: 29px;
    }

    .page-header h2 {
      margin: 0;
    }

    .score-card {
      min-height: 12.5vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scoreboard {
      width: 100%;
      display: flex;
      justify-content: space-between;
      text-align: center;
      gap: 15px;
      align-items: center;
    }

    .team-name {
      cursor: pointer;
      font-weight: bold;
      text-decoration: underline;
      text-underline-offset: 4px;
      font-size: 17px;
    }

    .score {
      font-size: 56px;
      font-weight: bold;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #334155;
    }

    .gear {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      cursor: pointer;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    h2 {
      text-align: center;
    }

    h4 {
      margin: 16px 0 8px;
      font-size: 14px;
      color: #dbeafe;
    }

    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .trait-card {
      padding: 14px 10px;
      border-radius: 10px;
      border: 1px solid #375984;
      background: #13294d;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trait-card.selected {
      background: #2563eb;
      border-color: #60a5fa;
    }

    .player-row {
      padding: 15px;
      border-radius: 12px;
      background: #13294d;
      border: 1px solid #375984;
      margin-top: 10px;
      cursor: pointer;
    }

    .player-name {
      font-size: 17px;
      font-weight: bold;
    }

    .player-detail {
      font-size: 13px;
      color: #dbeafe;
      margin-top: 4px;
      line-height: 1.35;
    }

    .empty-state {
      color: #dbeafe;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="appHome">
    <div class="logo">
      <img src="/Swami Golf Logo.png" class="logo-img">
    </div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>
  </div>

  <div id="tripHome" class="hidden">
    <div>
      <div class="page-header">
        <div class="homeBtn" onclick="goHome()">🏠</div>
        <h2>Pinehurst 2026</h2>
        <div class="gear" onclick="openSettings()">⚙️</div>
      </div>

      <div class="card score-card">
        <div class="scoreboard">
          <div>
            <div id="teamAName" class="team-name" onclick="openTeamRoster('A')">
              Team A
            </div>
            <div class="score">0</div>
          </div>

          <div>VS</div>

          <div>
            <div id="teamBName" class="team-name" onclick="openTeamRoster('B')">
              Team B
            </div>
            <div class="score">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="teamRosterScreen" class="hidden">
    <h2 id="teamRosterTitle">Team Roster</h2>

    <div class="card">
      <div id="teamRosterList"></div>
      <button onclick="goTripHome()" class="secondary">Back</button>
    </div>
  </div>

  <div id="settingsScreen" class="hidden">
    <h2>Settings</h2>

    <div class="card">
      <button onclick="openTeamEdit()">Edit Team Names</button>
      <button onclick="openPlayerList()">Add / Edit Players</button>
      <button onclick="goTripHome()" class="secondary">Back</button>
    </div>
  </div>

  <div id="teamScreen" class="hidden">
    <h2>Team Names</h2>

    <div class="card">
      <input id="teamAInput" placeholder="Team A Name"/>
      <input id="teamBInput" placeholder="Team B Name"/>

      <button onclick="saveTeams()">Save</button>
      <button onclick="openSettings()" class="secondary">Back</button>
    </div>
  </div>

  <div id="playerListScreen" class="hidden">
    <h2>Players</h2>

    <div class="card">
      <button onclick="openPlayer()">Add New Player</button>
      <div id="playerList"></div>
      <button onclick="openSettings()" class="secondary">Back</button>
    </div>
  </div>

  <div id="playerScreen" class="hidden">
    <h2 id="playerScreenTitle">Player Profile</h2>

    <div class="card">
      <input id="playerName" placeholder="Name"/>
      <input id="nickname" placeholder="Nickname"/>

      <select id="playerTeam">
        <option value="">Assign to Team</option>
      </select>

      <h4>Strengths</h4>
      <div id="strengths" class="traits-grid"></div>

      <h4>Weaknesses</h4>
      <div id="weaknesses" class="traits-grid"></div>

      <button onclick="savePlayer()">Save Player</button>
      <button onclick="openPlayerList()" class="secondary">Back to Player List</button>
    </div>
  </div>

</div>

<script>
let editingPlayerIndex = null;

function show(id) {
  [
    "appHome",
    "tripHome",
    "teamRosterScreen",
    "settingsScreen",
    "teamScreen",
    "playerListScreen",
    "playerScreen"
  ].forEach(x => document.getElementById(x).classList.add("hidden"));

  document.getElementById(id).classList.remove("hidden");
}

function openTripHome() {
  show("tripHome");
  loadTeams();
}

function goHome() {
  show("appHome");
}

function openSettings() {
  show("settingsScreen");
}

function goTripHome() {
  show("tripHome");
  loadTeams();
}

function openTeamEdit() {
  show("teamScreen");
  loadInputs();
}

function openPlayerList() {
  show("playerListScreen");
  renderPlayerList();
}

function openPlayer(index = null) {
  editingPlayerIndex = index;
  show("playerScreen");
  renderTraits();
  loadTeamDropdown();

  if (index === null) {
    document.getElementById("playerScreenTitle").innerText = "Add Player";
    resetPlayerForm();
  } else {
    document.getElementById("playerScreenTitle").innerText = "Edit Player";
    loadPlayerForEdit(index);
  }
}

function saveTeams() {
  const teamA = document.getElementById("teamAInput").value || "Team A";
  const teamB = document.getElementById("teamBInput").value || "Team B";

  const oldTeamA = localStorage.getItem("teamA") || "Team A";
  const oldTeamB = localStorage.getItem("teamB") || "Team B";

  localStorage.setItem("teamA", teamA);
  localStorage.setItem("teamB", teamB);

  updatePlayerTeamsAfterRename(oldTeamA, teamA, oldTeamB, teamB);

  loadTeams();
  openSettings();
}

function updatePlayerTeamsAfterRename(oldTeamA, newTeamA, oldTeamB, newTeamB) {
  let players = JSON.parse(localStorage.getItem("players") || "[]");

  players = players.map(player => {
    if (player.team === oldTeamA) {
      player.team = newTeamA;
    }

    if (player.team === oldTeamB) {
      player.team = newTeamB;
    }

    return player;
  });

  localStorage.setItem("players", JSON.stringify(players));
}

function loadTeams() {
  document.getElementById("teamAName").innerText =
    localStorage.getItem("teamA") || "Team A";

  document.getElementById("teamBName").innerText =
    localStorage.getItem("teamB") || "Team B";
}

function loadInputs() {
  document.getElementById("teamAInput").value =
    localStorage.getItem("teamA") || "";

  document.getElementById("teamBInput").value =
    localStorage.getItem("teamB") || "";
}

function loadTeamDropdown() {
  const teamA = localStorage.getItem("teamA") || "Team A";
  const teamB = localStorage.getItem("teamB") || "Team B";

  const select = document.getElementById("playerTeam");

  select.innerHTML = `
    <option value="">Assign to Team</option>
    <option value="${teamA}">${teamA}</option>
    <option value="${teamB}">${teamB}</option>
  `;
}

function openTeamRoster(teamKey) {
  const teamName = teamKey === "A"
    ? localStorage.getItem("teamA") || "Team A"
    : localStorage.getItem("teamB") || "Team B";

  document.getElementById("teamRosterTitle").innerText = teamName;
  renderTeamRoster(teamName);
  show("teamRosterScreen");
}

function renderTeamRoster(teamName) {
  const list = document.getElementById("teamRosterList");
  const players = JSON.parse(localStorage.getItem("players") || "[]");
  const teamPlayers = players.filter(player => player.team === teamName);

  list.innerHTML = "";

  if (teamPlayers.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        No players assigned to ${teamName} yet.
      </div>
    `;
    return;
  }

  teamPlayers.forEach(player => {
    const div = document.createElement("div");
    div.className = "player-row";

    div.innerHTML = `
      <div class="player-name">${player.name}</div>
      <div class="player-detail">
        ${player.nickname ? `"${player.nickname}"<br>` : ""}
        <strong>Strengths:</strong>
        ${player.strengths && player.strengths.length ? player.strengths.join(", ") : "None selected"}
        <br>
        <strong>Weaknesses:</strong>
        ${player.weaknesses && player.weaknesses.length ? player.weaknesses.join(", ") : "None selected"}
      </div>
    `;

    list.appendChild(div);
  });
}

const strengths = [
  "Fairway Finder-ish",
  "Green-Seeking Missiles",
  "Flop Shot Flair",
  "Putt Whisperer Energy",
  "Beer Consistency",
  "Trash Talk Volume",
  "Cart Navigation Skills",
  "Mental Toughness",
  "Snack Management",
  "Mulligan Negotiation",
  "Cart Cooler Logistics",
  "Approach Shot Optimism",
  "Gimme Putt Diplomacy",
  "Post-Round Storytelling",
  "Fairway Finder Energy",
  "Club Twirl Confidence"
];

const weaknesses = [
  "3-Putt Specialist",
  "Slice Machine",
  "Hook Under Pressure",
  "Slow Play Offender",
  "Bunker Magnet",
  "Ball Disappearance Expert",
  "Water Hazard Addiction",
  "Driver Meltdown",
  "Putting Confidence Issues",
  "Breakfast Ball Dependency",
  "Range Hero Syndrome",
  "Yardage Guessing Disorder",
  "Cart Path Only Confusion",
  "Scorecard Math Problems",
  "Wind Blame Specialist",
  "Lost Tee Box Focus"
];

let selectedStrengths = [];
let selectedWeaknesses = [];

function renderTraits() {
  const s = document.getElementById("strengths");
  const w = document.getElementById("weaknesses");

  s.innerHTML = "";
  w.innerHTML = "";

  strengths.forEach(x => {
    const div = document.createElement("div");
    div.className = "trait-card";
    div.innerText = x;
    div.onclick = () => toggleTrait(div, x, "strength");
    s.appendChild(div);
  });

  weaknesses.forEach(x => {
    const div = document.createElement("div");
    div.className = "trait-card";
    div.innerText = x;
    div.onclick = () => toggleTrait(div, x, "weakness");
    w.appendChild(div);
  });
}

function toggleTrait(el, value, type) {
  el.classList.toggle("selected");

  let arr = type === "strength" ? selectedStrengths : selectedWeaknesses;

  if (arr.includes(value)) {
    arr.splice(arr.indexOf(value), 1);
  } else {
    arr.push(value);
  }
}

function resetPlayerForm() {
  document.getElementById("playerName").value = "";
  document.getElementById("nickname").value = "";
  document.getElementById("playerTeam").value = "";

  selectedStrengths = [];
  selectedWeaknesses = [];

  document.querySelectorAll(".trait-card").forEach(card => {
    card.classList.remove("selected");
  });
}

function loadPlayerForEdit(index) {
  const players = JSON.parse(localStorage.getItem("players") || "[]");
  const player = players[index];

  document.getElementById("playerName").value = player.name || "";
  document.getElementById("nickname").value = player.nickname || "";
  document.getElementById("playerTeam").value = player.team || "";

  selectedStrengths = player.strengths || [];
  selectedWeaknesses = player.weaknesses || [];

  document.querySelectorAll("#strengths .trait-card").forEach(card => {
    if (selectedStrengths.includes(card.innerText)) {
      card.classList.add("selected");
    }
  });

  document.querySelectorAll("#weaknesses .trait-card").forEach(card => {
    if (selectedWeaknesses.includes(card.innerText)) {
      card.classList.add("selected");
    }
  });
}

function savePlayer() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;
  const team = document.getElementById("playerTeam").value;

  if (!name.trim()) {
    alert("Please enter a player name.");
    return;
  }

  const player = {
    name,
    nickname,
    team,
    strengths: selectedStrengths,
    weaknesses: selectedWeaknesses
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");

  if (editingPlayerIndex === null) {
    players.push(player);
  } else {
    players[editingPlayerIndex] = player;
  }

  localStorage.setItem("players", JSON.stringify(players));

  editingPlayerIndex = null;
  openPlayerList();
}

function renderPlayerList() {
  const list = document.getElementById("playerList");
  const players = JSON.parse(localStorage.getItem("players") || "[]");

  list.innerHTML = "";

  if (players.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        No players yet. Tap “Add New Player” to create one.
      </div>
    `;
    return;
  }

  players.forEach((player, index) => {
    const div = document.createElement("div");
    div.className = "player-row";
    div.onclick = () => openPlayer(index);

    div.innerHTML = `
      <div class="player-name">${player.name}</div>
      <div class="player-detail">
        ${player.nickname ? `"${player.nickname}" • ` : ""}
        ${player.team ? player.team : "No team assigned"}
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
