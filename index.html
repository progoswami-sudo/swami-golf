<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      background-attachment: fixed;
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin: 10px 0 20px;
    }

    .logo-img {
      max-width: 160px;
      width: 100%;
    }

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(18, 35, 63, 0.9);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    .gear {
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    h2 { text-align: center; }

    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .trait-card {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2b3d5c;
      background: #0f1b33;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
    }

    .trait-card.selected {
      background: #2563eb;
      border-color: #60a5fa;
    }

    .player-card {
      padding: 12px;
      border-radius: 10px;
      background: #0f1b33;
      border: 1px solid #2b3d5c;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .player-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .small-btn {
      flex: 1;
      padding: 10px;
      font-size: 12px;
      border-radius: 8px;
      background: #1d4ed8;
    }

    .danger {
      background: #dc2626;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="appHome">
    <div class="logo">
      <img src="/Swami Golf Logo.png" class="logo-img">
    </div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>
  </div>

  <!-- TRIP -->
  <div id="tripHome" class="hidden">
    <div style="position:relative;">
      <div class="homeBtn" onclick="goHome()">🏠</div>
      <div class="gear" onclick="openSettings()">⚙️</div>

      <h2>Pinehurst 2026</h2>

      <div class="card">
        <div class="scoreboard">
          <div>
            <div id="teamAName">Team A</div>
            <div class="score">0</div>
          </div>
          <div>VS</div>
          <div>
            <div id="teamBName">Team B</div>
            <div class="score">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsScreen" class="hidden">
    <h2>Settings</h2>

    <div class="card">
      <button onclick="openTeamEdit()">Edit Team Names</button>
      <button onclick="openPlayerList()">Add / Edit Players</button>
      <button onclick="goTripHome()">Back</button>
    </div>
  </div>

  <!-- TEAM EDIT -->
  <div id="teamScreen" class="hidden">
    <h2>Team Names</h2>

    <div class="card">
      <input id="teamAInput" placeholder="Team A Name"/>
      <input id="teamBInput" placeholder="Team B Name"/>
      <button onclick="saveTeams()">Save</button>
      <button onclick="openSettings()">Back</button>
    </div>
  </div>

  <!-- PLAYER LIST -->
  <div id="playerListScreen" class="hidden">
    <h2>Players</h2>

    <div class="card">
      <button onclick="openPlayer()">+ Add New Player</button>
    </div>

    <div id="playerList"></div>

    <button onclick="openSettings()">Back</button>
  </div>

  <!-- PLAYER PROFILE -->
  <div id="playerScreen" class="hidden">
    <h2>Player Profile</h2>

    <div class="card">
      <input id="playerName" placeholder="Name"/>
      <input id="nickname" placeholder="Nickname"/>

      <h2 style="font-size:14px;">Strengths</h2>
      <div id="strengths" class="traits-grid"></div>

      <h2 style="font-size:14px;">Weaknesses</h2>
      <div id="weaknesses" class="traits-grid"></div>

      <button onclick="savePlayer()">Save Player</button>
      <button onclick="openPlayerList()">Back</button>
    </div>
  </div>

</div>

<script>

/* NAV */
function show(id){
  ["appHome","tripHome","settingsScreen","teamScreen","playerScreen","playerListScreen"]
    .forEach(x => document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function openTripHome(){show("tripHome"); loadTeams();}
function goHome(){show("appHome")}
function openSettings(){show("settingsScreen")}
function openTeamEdit(){show("teamScreen"); loadInputs();}
function openPlayer(){resetPlayerForm(); show("playerScreen"); renderTraits();}
function openPlayerList(){show("playerListScreen"); renderPlayerList();}

/* TEAMS */
function saveTeams(){
  localStorage.setItem("teamA", document.getElementById("teamAInput").value || "Team A");
  localStorage.setItem("teamB", document.getElementById("teamBInput").value || "Team B");
  loadTeams();
  openSettings();
}

function loadTeams(){
  document.getElementById("teamAName").innerText = localStorage.getItem("teamA") || "Team A";
  document.getElementById("teamBName").innerText = localStorage.getItem("teamB") || "Team B";
}

function loadInputs(){
  document.getElementById("teamAInput").value = localStorage.getItem("teamA") || "";
  document.getElementById("teamBInput").value = localStorage.getItem("teamB") || "";
}

/* PLAYERS */
let editIndex = null;

function getPlayers(){
  return JSON.parse(localStorage.getItem("players") || "[]");
}

function savePlayers(players){
  localStorage.setItem("players", JSON.stringify(players));
}

/* LIST */
function renderPlayerList(){
  const list = document.getElementById("playerList");
  list.innerHTML = "";

  const players = getPlayers();

  players.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "player-card";

    div.innerHTML = `
      <strong>${p.name}</strong> (${p.nickname || ""})<br/>
      <small>Team: ${p.team || "Unassigned"}</small>

      <div class="player-actions">
        <button class="small-btn" onclick="editPlayer(${i})">Edit</button>
        <button class="small-btn danger" onclick="deletePlayer(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

function editPlayer(i){
  const p = getPlayers()[i];
  editIndex = i;

  document.getElementById("playerName").value = p.name;
  document.getElementById("nickname").value = p.nickname;

  show("playerScreen");
  renderTraits();
}

/* DELETE */
function deletePlayer(i){
  const players = getPlayers();
  players.splice(i,1);
  savePlayers(players);
  renderPlayerList();
}

/* PLAYER FORM */
const strengths = ["Driver Accuracy","Iron Play","Short Game","Putting","Beer Consistency","Trash Talk Volume","Cart Navigation Skills","Mental Toughness","Snack Management"];
const weaknesses = ["3-Putt Specialist","Slice Machine","Hook Under Pressure","Slow Play Offender","Bunker Magnet","Ball Disappearance Expert","Water Hazard Addiction","Driver Meltdown","Putting Confidence Issues"];

let selectedStrengths = [];
let selectedWeaknesses = [];

function resetPlayerForm(){
  editIndex = null;
  selectedStrengths = [];
  selectedWeaknesses = [];
}

function renderTraits(){
  const s = document.getElementById("strengths");
  const w = document.getElementById("weaknesses");

  if (s.innerHTML) return;

  strengths.forEach(x=>{
    const d = document.createElement("div");
    d.className="trait-card";
    d.innerText=x;
    d.onclick=()=>toggle(d,x,"s");
    s.appendChild(d);
  });

  weaknesses.forEach(x=>{
    const d = document.createElement("div");
    d.className="trait-card";
    d.innerText=x;
    d.onclick=()=>toggle(d,x,"w");
    w.appendChild(d);
  });
}

function toggle(el,val,type){
  el.classList.toggle("selected");

  const arr = type==="s"?selectedStrengths:selectedWeaknesses;

  if(arr.includes(val)){
    arr.splice(arr.indexOf(val),1);
  }else{
    arr.push(val);
  }
}

/* SAVE PLAYER */
function savePlayer(){
  const players = getPlayers();

  const player = {
    name: document.getElementById("playerName").value,
    nickname: document.getElementById("nickname").value,
    strengths: selectedStrengths,
    weaknesses: selectedWeaknesses,
    team: "Unassigned"
  };

  if(editIndex !== null){
    players[editIndex] = player;
  }else{
    players.push(player);
  }

  savePlayers(players);
  openPlayerList();
}

</script>

</body>
</html>
