<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
    }

    /* ================= LOGO ================= */

    .logo {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .logo-img {
      max-width: 140px;
      width: 100%;
      height: auto;
      display: block;
    }

    /* ================= HOME TILE ================= */

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      transition: 0.2s;
    }

    .tile:hover {
      transform: scale(1.02);
      border-color: #4c7dff;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .sub {
      text-align: center;
      font-size: 13px;
      color: #a9b7d0;
    }

    /* ================= SCREENS ================= */

    .card {
      background: rgba(18, 35, 63, 0.85);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    /* ================= SCOREBOARD ================= */

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      margin-top: 10px;
    }

    .score {
      font-size: 44px;
      font-weight: bold;
    }

    /* ================= BUTTONS ================= */

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #60a5fa;
    }

    .primary {
      background: #f97316;
    }

    /* ================= ICONS ================= */

    .gear {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 14px;
      cursor: pointer;
      color: #cbd5e1;
    }

    /* ================= FORM ================= */

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin: 4px 0;
    }

    h4 {
      margin: 10px 0 5px;
      font-size: 14px;
      color: #cbd5e1;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- ================= HOME ================= -->
  <div id="appHome">

    <div class="logo">
      <img src="/Swami Golf Logo.png" alt="Swami Golf Logo" class="logo-img">
    </div>

    <h1>Swami Golf</h1>
    <div class="sub">Your golf trip universe</div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>

  </div>

  <!-- ================= TRIP HOME ================= -->
  <div id="tripHome" class="hidden">

    <div style="position:relative;">

      <div class="homeBtn" onclick="goHome()">← Home</div>
      <div class="gear" onclick="openSettings()">⚙️</div>

      <h1>Pinehurst 2026</h1>

      <div class="card">
        <div class="scoreboard">
          <div>
            <div>Team A</div>
            <div class="score">0</div>
          </div>

          <div>VS</div>

          <div>
            <div>Team B</div>
            <div class="score">0</div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- ================= SETTINGS ================= -->
  <div id="settingsScreen" class="hidden">

    <h2>Settings</h2>

    <div class="card">
      <button onclick="openTeamEdit()">Edit Team Names</button>
      <button onclick="openPlayer()">Add / Edit Players</button>
      <button onclick="goTripHome()">Back</button>
    </div>

  </div>

  <!-- ================= TEAM EDIT ================= -->
  <div id="teamScreen" class="hidden">

    <h2>Team Names</h2>

    <div class="card">
      <input placeholder="Team A Name"/>
      <input placeholder="Team B Name"/>
      <button>Save</button>
      <button onclick="openSettings()">Back</button>
    </div>

  </div>

  <!-- ================= PLAYER ================= -->
  <div id="playerScreen" class="hidden">

    <h2>Player Profile</h2>

    <div class="card">

      <input id="playerName" placeholder="Name"/>
      <input id="nickname" placeholder="Nickname"/>

      <h4>Strengths</h4>
      <div id="strengths"></div>

      <h4>Weaknesses</h4>
      <div id="weaknesses"></div>

      <button onclick="savePlayer()">Save Player</button>
      <button onclick="openSettings()">Back</button>

    </div>

  </div>

</div>

<script>

/* ================= NAV ================= */

function show(id) {
  ["appHome","tripHome","settingsScreen","teamScreen","playerScreen"]
    .forEach(x => document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function openTripHome() { show("tripHome"); }
function goHome() { show("appHome"); }
function goTripHome() { show("tripHome"); }
function openSettings() { show("settingsScreen"); }
function openTeamEdit() { show("teamScreen"); }
function openPlayer() { show("playerScreen"); renderTraits(); }

/* ================= TRAITS ================= */

const strengths = [
  "Driver Accuracy","Iron Play","Short Game","Putting",
  "Beer Consistency","Trash Talk Volume","Cart Navigation Skills",
  "Mental Toughness","Snack Management"
];

const weaknesses = [
  "3-Putt Specialist","Slice Machine","Hook Under Pressure",
  "Slow Play Offender","Bunker Magnet","Ball Disappearance Expert"
];

function renderTraits() {
  const s = document.getElementById("strengths");
  const w = document.getElementById("weaknesses");

  if (s.innerHTML) return;

  strengths.forEach(x => {
    s.innerHTML += `<label><input type="checkbox">${x}</label>`;
  });

  weaknesses.forEach(x => {
    w.innerHTML += `<label><input type="checkbox">${x}</label>`;
  });
}

/* ================= SAVE ================= */

function savePlayer() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  const player = { name, nickname };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert("Saved");
  openSettings();
}

</script>

</body>
</html>
