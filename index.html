<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1220, #111827);
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .tile {
      background: rgba(30,41,59,0.9);
      border: 1px solid #334155;
      padding: 18px;
      border-radius: 14px;
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .tile:hover {
      background: rgba(51,65,85,0.9);
    }

    .card {
      background: rgba(30,41,59,0.9);
      border: 1px solid #334155;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    /* SCOREBOARD */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      font-size: 18px;
      margin-top: 10px;
    }

    .score {
      font-size: 42px;
      font-weight: bold;
    }

    /* BUTTONS */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover { background: #fb923c; }

    .secondary { background: #3b82f6; }

    /* GEAR */
    .gear {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 22px;
      cursor: pointer;
    }

    /* SETTINGS LIST */
    .list-item {
      padding: 12px;
      border: 1px solid #334155;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
      background: rgba(15,23,42,0.7);
    }

    /* PLAYER CHECKBOX ROWS */
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0;
      flex-wrap: wrap;
    }

    .row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- ================= APP HOME ================= -->
  <div id="appHome">

    <h1>Swami Golf</h1>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>

  </div>

  <!-- ================= TRIP HOME ================= -->
  <div id="tripHome" class="hidden">

    <div style="position:relative;">
      <div class="gear" onclick="openSettings()">⚙️</div>

      <h1>Pinehurst 2026</h1>

      <div class="card">
        <div class="scoreboard">
          <div>
            <div id="teamAName">Team A</div>
            <div class="score">0</div>
          </div>

          <div>VS</div>

          <div>
            <div id="teamBName">Team B</div>
            <div class="score">0</div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- ================= SETTINGS ================= -->
  <div id="settingsScreen" class="hidden">

    <h2>Settings</h2>

    <div class="card">
      <div class="list-item" onclick="openTeamEdit()">
        Edit Team Names
      </div>

      <div class="list-item" onclick="openPlayerList()">
        Edit / Add Players
      </div>

      <button class="secondary" onclick="goTripHome()">← Back</button>
    </div>

  </div>

  <!-- ================= TEAM EDIT ================= -->
  <div id="teamScreen" class="hidden">

    <h2>Edit Teams</h2>

    <div class="card">
      <input id="teamAInput" placeholder="Team A Name"/>
      <input id="teamBInput" placeholder="Team B Name"/>

      <button onclick="saveTeams()">Save</button>
      <button class="secondary" onclick="openSettings()">← Back</button>
    </div>

  </div>

  <!-- ================= PLAYER SCREEN ================= -->
  <div id="playerScreen" class="hidden">

    <h2>Add Player</h2>

    <div class="card">

      <input id="playerName" placeholder="Player Name"/>
      <input id="nickname" placeholder="Nickname"/>

      <h4>Strengths</h4>
      <div id="strengths"></div>

      <h4>Weaknesses</h4>
      <div id="weaknesses"></div>

      <button onclick="savePlayer()">Save Player</button>
      <button class="secondary" onclick="openSettings()">← Back</button>

    </div>

  </div>

</div>

<script>

/* ================= NAVIGATION ================= */

function show(id) {
  ["appHome","tripHome","settingsScreen","teamScreen","playerScreen"]
    .forEach(x => document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function openTripHome() { show("tripHome"); }
function goTripHome() { show("tripHome"); }
function openSettings() { show("settingsScreen"); }
function openTeamEdit() { show("teamScreen"); }
function openPlayerList() { show("playerScreen"); showTraits(); }

/* ================= DEFAULT DATA ================= */

const strengths = [
  "Driver Accuracy","Iron Play","Short Game","Putting",
  "Beer Consistency","Trash Talk Volume","Cart Navigation Skills",
  "Mental Toughness","Snack Management","Course Management"
];

const weaknesses = [
  "3-Putt Specialist","Slice Machine","Hook Under Pressure",
  "Slow Play Offender","Bunker Magnet","Ball Disappearance Expert"
];

/* ================= TRAITS UI ================= */

function showTraits() {
  const s = document.getElementById("strengths");
  const w = document.getElementById("weaknesses");

  if (s.innerHTML) return;

  strengths.forEach(item => {
    s.innerHTML += `
      <div class="row">
        <label><input type="checkbox" value="${item}">${item}</label>
      </div>`;
  });

  weaknesses.forEach(item => {
    w.innerHTML += `
      <div class="row">
        <label><input type="checkbox" value="${item}">${item}</label>
      </div>`;
  });
}

/* ================= SAVE TEAM ================= */

function saveTeams() {
  document.getElementById("teamAName").innerText =
    document.getElementById("teamAInput").value || "Team A";

  document.getElementById("teamBName").innerText =
    document.getElementById("teamBInput").value || "Team B";

  alert("Teams updated");
  openSettings();
}

/* ================= SAVE PLAYER ================= */

function savePlayer() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  const get = (id) =>
    Array.from(document.querySelectorAll(`#${id} input:checked`))
      .map(x => x.value);

  const player = {
    name,
    nickname,
    strengths: get("strengths"),
    weaknesses: get("weaknesses")
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert(`${name} added 🏌️`);
  openSettings();
}

</script>

</body>
</html>
