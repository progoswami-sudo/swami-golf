<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
    }

    .logo {
      display: flex;
      justify-content: center;
      margin: 10px 0 20px;
    }

    .logo-img {
      max-width: 160px;
      width: 100%;
    }

    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(18, 35, 63, 0.85);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-top: 10px;
    }

    .score {
      font-size: 44px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    .gear {
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    h2 { text-align: center; }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="appHome">
    <div class="logo">
      <img src="/Swami Golf Logo.png" class="logo-img">
    </div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>
  </div>

  <!-- TRIP -->
  <div id="tripHome" class="hidden">
    <div style="position:relative;">
      <div class="homeBtn" onclick="goHome()">🏠</div>
      <div class="gear" onclick="openSettings()">⚙️</div>

      <h2>Pinehurst 2026</h2>

      <div class="card">
        <div class="scoreboard">
          <div>
            <div id="teamAName">Team A</div>
            <div class="score">0</div>
          </div>
          <div>VS</div>
          <div>
            <div id="teamBName">Team B</div>
            <div class="score">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsScreen" class="hidden">
    <h2>Settings</h2>

    <div class="card">
      <button onclick="openTeamEdit()">Edit Team Names</button>
      <button onclick="openPlayer()">Add / Edit Players</button>
      <button onclick="goTripHome()">Back</button>
    </div>
  </div>

  <!-- TEAM EDIT -->
  <div id="teamScreen" class="hidden">
    <h2>Team Names</h2>

    <div class="card">
      <input id="teamAInput" placeholder="Team A Name"/>
      <input id="teamBInput" placeholder="Team B Name"/>
      <button onclick="saveTeams()">Save</button>
      <button onclick="openSettings()">Back</button>
    </div>
  </div>

  <!-- PLAYER (placeholder screen restored) -->
  <div id="playerScreen" class="hidden">
    <h2>Player Management</h2>

    <div class="card">
      <p>Add/Edit players functionality here</p>
      <button onclick="openSettings()">Back</button>
    </div>
  </div>

</div>

<script>

/* NAV */

function show(id) {
  ["appHome","tripHome","settingsScreen","teamScreen","playerScreen"]
    .forEach(x => document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function openTripHome(){show("tripHome"); loadTeams();}
function goHome(){show("appHome")}
function openSettings(){show("settingsScreen")}
function goTripHome(){show("tripHome"); loadTeams();}
function openTeamEdit(){show("teamScreen"); loadInputs();}
function openPlayer(){show("playerScreen");}

/* TEAM SAVE */

function saveTeams() {
  const teamA = document.getElementById("teamAInput").value || "Team A";
  const teamB = document.getElementById("teamBInput").value || "Team B";

  localStorage.setItem("teamA", teamA);
  localStorage.setItem("teamB", teamB);

  loadTeams();
  openSettings();
}

/* LOAD */

function loadTeams() {
  const teamA = localStorage.getItem("teamA") || "Team A";
  const teamB = localStorage.getItem("teamB") || "Team B";

  document.getElementById("teamAName").innerText = teamA;
  document.getElementById("teamBName").innerText = teamB;
}

function loadInputs() {
  document.getElementById("teamAInput").value = localStorage.getItem("teamA") || "";
  document.getElementById("teamBInput").value = localStorage.getItem("teamB") || "";
}

</script>

</body>
</html>
