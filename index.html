<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swami Golf</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1a2f, #050914);
      background-attachment: fixed;
      color: white;
    }

    .container {
      padding: 18px;
      max-width: 650px;
      margin: auto;
    }

    /* LOGO */
    .logo {
      display: flex;
      justify-content: center;
      margin: 10px 0 20px;
    }

    .logo-img {
      max-width: 160px;
      width: 100%;
    }

    /* TILE */
    .tile {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, #12233f, #0f1b33);
      border: 1px solid #2b3d5c;
      text-align: center;
      font-size: 18px;
      cursor: pointer;
    }

    .card {
      background: rgba(18, 35, 63, 0.9);
      border: 1px solid #2b3d5c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .hidden { display: none; }

    /* SCOREBOARD */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-top: 10px;
    }

    .score {
      font-size: 44px;
      font-weight: bold;
    }

    /* BUTTONS */
    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    /* ICONS */
    .gear {
      position: absolute;
      top: 6px;
      right: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    .homeBtn {
      position: absolute;
      top: 6px;
      left: 12px;
      font-size: 22px;
      cursor: pointer;
    }

    /* INPUT */
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    h2 { text-align: center; }

    h4 {
      margin: 10px 0 5px;
      font-size: 14px;
      color: #cbd5e1;
    }

    /* TRAITS GRID */
    .traits-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .trait-card {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2b3d5c;
      background: #0f1b33;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
    }

    .trait-card.selected {
      background: #2563eb;
      border-color: #60a5fa;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="appHome">
    <div class="logo">
      <img src="/Swami Golf Logo.png" class="logo-img">
    </div>

    <div class="tile" onclick="openTripHome()">
      🏌️ Pinehurst 2026
    </div>
  </div>

  <!-- TRIP -->
  <div id="tripHome" class="hidden">
    <div style="position:relative;">
      <div class="homeBtn" onclick="goHome()">🏠</div>
      <div class="gear" onclick="openSettings()">⚙️</div>

      <h2>Pinehurst 2026</h2>

      <div class="card">
        <div class="scoreboard">
          <div>
            <div id="teamAName">Team A</div>
            <div class="score">0</div>
          </div>
          <div>VS</div>
          <div>
            <div id="teamBName">Team B</div>
            <div class="score">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsScreen" class="hidden">
    <h2>Settings</h2>

    <div class="card">
      <button onclick="openTeamEdit()">Edit Team Names</button>
      <button onclick="openPlayer()">Add / Edit Players</button>
      <button onclick="goTripHome()">Back</button>
    </div>
  </div>

  <!-- TEAM EDIT -->
  <div id="teamScreen" class="hidden">
    <h2>Team Names</h2>

    <div class="card">
      <input id="teamAInput" placeholder="Team A Name"/>
      <input id="teamBInput" placeholder="Team B Name"/>
      <button onclick="saveTeams()">Save</button>
      <button onclick="openSettings()">Back</button>
    </div>
  </div>

  <!-- PLAYER PROFILE -->
  <div id="playerScreen" class="hidden">
    <h2>Player Profile</h2>

    <div class="card">
      <input id="playerName" placeholder="Name"/>
      <input id="nickname" placeholder="Nickname"/>

      <h4>Strengths</h4>
      <div id="strengths" class="traits-grid"></div>

      <h4>Weaknesses</h4>
      <div id="weaknesses" class="traits-grid"></div>

      <button onclick="savePlayer()">Save Player</button>
      <button onclick="openSettings()">Back</button>
    </div>
  </div>

</div>

<script>

/* NAV */
function show(id) {
  ["appHome","tripHome","settingsScreen","teamScreen","playerScreen"]
    .forEach(x => document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function openTripHome(){show("tripHome"); loadTeams();}
function goHome(){show("appHome")}
function openSettings(){show("settingsScreen")}
function goTripHome(){show("tripHome"); loadTeams();}
function openTeamEdit(){show("teamScreen"); loadInputs();}
function openPlayer(){show("playerScreen"); renderTraits();}

/* TEAM LOGIC */
function saveTeams() {
  const teamA = document.getElementById("teamAInput").value || "Team A";
  const teamB = document.getElementById("teamBInput").value || "Team B";

  localStorage.setItem("teamA", teamA);
  localStorage.setItem("teamB", teamB);

  loadTeams();
  openSettings();
}

function loadTeams() {
  document.getElementById("teamAName").innerText =
    localStorage.getItem("teamA") || "Team A";
  document.getElementById("teamBName").innerText =
    localStorage.getItem("teamB") || "Team B";
}

function loadInputs() {
  document.getElementById("teamAInput").value =
    localStorage.getItem("teamA") || "";
  document.getElementById("teamBInput").value =
    localStorage.getItem("teamB") || "";
}

/* PLAYER TRAITS */

const strengths = [
  "Driver Accuracy","Iron Play","Short Game","Putting",
  "Beer Consistency","Trash Talk Volume","Cart Navigation Skills",
  "Mental Toughness","Snack Management"
];

const weaknesses = [
  "3-Putt Specialist","Slice Machine","Hook Under Pressure",
  "Slow Play Offender","Bunker Magnet","Ball Disappearance Expert",
  "Water Hazard Addiction","Driver Meltdown","Putting Confidence Issues"
];

let selectedStrengths = [];
let selectedWeaknesses = [];

function renderTraits() {
  const s = document.getElementById("strengths");
  const w = document.getElementById("weaknesses");

  if (s.innerHTML) return;

  strengths.forEach(x => {
    const div = document.createElement("div");
    div.className = "trait-card";
    div.innerText = x;
    div.onclick = () => toggleTrait(div, x, "strength");
    s.appendChild(div);
  });

  weaknesses.forEach(x => {
    const div = document.createElement("div");
    div.className = "trait-card";
    div.innerText = x;
    div.onclick = () => toggleTrait(div, x, "weakness");
    w.appendChild(div);
  });
}

function toggleTrait(el, value, type) {
  el.classList.toggle("selected");

  let arr = type === "strength" ? selectedStrengths : selectedWeaknesses;

  if (arr.includes(value)) {
    arr.splice(arr.indexOf(value), 1);
  } else {
    arr.push(value);
  }
}

function savePlayer() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  const player = {
    name,
    nickname,
    strengths: selectedStrengths,
    weaknesses: selectedWeaknesses
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert("Player Saved");
  openSettings();
}

</script>

</body>
</html>
