<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pinehurst Cup 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1220, #111827);
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 5px;
    }

    .sub {
      text-align: center;
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #334155;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      margin-bottom: 10px;
    }

    .team {
      width: 40%;
    }

    .score {
      font-size: 40px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #fb923c;
    }

    .secondary {
      background: #3b82f6;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 3px 0;
      color: #cbd5f5;
    }

    h4 {
      margin: 10px 0 5px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- ================= HOME SCREEN ================= -->
  <div id="homeScreen">

    <h1>Pinehurst Cup 2026</h1>
    <div class="sub">Oct 1–4 • Courses 2, 4, 8, 9</div>

    <div class="card">
      <div class="scoreboard">
        <div class="team">
          <div>Team A</div>
          <div class="score">0</div>
        </div>

        <div>VS</div>

        <div class="team">
          <div>Team B</div>
          <div class="score">0</div>
        </div>
      </div>
    </div>

    <button onclick="showPlayerScreen()">➕ Add Player</button>
    <button class="secondary" onclick="alert('Roster screen next step')">👥 View Roster</button>
    <button class="secondary" onclick="alert('Match system coming next')">🏌️ Start Matches</button>

  </div>

  <!-- ================= PLAYER SCREEN ================= -->
  <div id="playerScreen" class="hidden">

    <div class="card">
      <h3>➕ Create Player Profile</h3>

      <input id="playerName" placeholder="Player Name" />
      <input id="nickname" placeholder="Nickname (e.g. Sand Trap King)" />

      <h4>🏌️ Golf Strengths</h4>
      <div id="golfStrengths"></div>

      <h4>🍻 Funny Strengths</h4>
      <div id="funStrengths"></div>

      <h4>🏌️ Golf Weaknesses</h4>
      <div id="golfWeaknesses"></div>

      <h4>😂 Funny Weaknesses</h4>
      <div id="funWeaknesses"></div>

      <button onclick="savePlayerProfile()">Save Player</button>
      <button class="secondary" onclick="goHome()">← Back Home</button>
    </div>

  </div>

</div>

<script>

/* ================= NAVIGATION ================= */

function showPlayerScreen() {
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("playerScreen").classList.remove("hidden");
}

function goHome() {
  document.getElementById("playerScreen").classList.add("hidden");
  document.getElementById("homeScreen").classList.remove("hidden");
}

/* ================= TRAITS ================= */

const golfStrengths = [
  "Driver Accuracy", "Iron Play", "Short Game", "Putting",
  "Sand Play", "Mental Toughness", "Course Management",
  "One Good Shot Per Hole"
];

const funnyStrengths = [
  "Beer Consistency", "Cart Navigation Skills", "Trash Talk Volume",
  "Snack Management", "Group Text Responsiveness",
  "Emergency Ball Finder", "Clubhouse Reputation"
];

const golfWeaknesses = [
  "3-Putt Specialist", "Slice Machine", "Hook Under Pressure",
  "Bunker Magnet", "Driver Chaos", "Par 5 Overconfidence"
];

const funnyWeaknesses = [
  "Lost GPS Reliance", "Rules Lawyer (Always Wrong)", "Slow Play Offender",
  "One More Swing Syndrome", "Ball Disappearance Expert",
  "Fairway Loss Specialist"
];

/* ================= RENDER CHECKBOXES ================= */

function render(list, id) {
  const el = document.getElementById(id);
  list.forEach(item => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
    el.appendChild(label);
  });
}

render(golfStrengths, "golfStrengths");
render(funnyStrengths, "funStrengths");
render(golfWeaknesses, "golfWeaknesses");
render(funnyWeaknesses, "funWeaknesses");

/* ================= SAVE PLAYER ================= */

function savePlayerProfile() {
  const name = document.getElementById("playerName").value;
  const nickname = document.getElementById("nickname").value;

  function getSelected(id) {
    return Array.from(document.querySelectorAll(`#${id} input:checked`))
      .map(e => e.value);
  }

  const player = {
    name,
    nickname,
    golfStrengths: getSelected("golfStrengths"),
    funnyStrengths: getSelected("funStrengths"),
    golfWeaknesses: getSelected("golfWeaknesses"),
    funnyWeaknesses: getSelected("funWeaknesses")
  };

  let players = JSON.parse(localStorage.getItem("players") || "[]");
  players.push(player);
  localStorage.setItem("players", JSON.stringify(players));

  alert(`${name} added to Pinehurst Cup 🏌️‍♂️`);

  goHome();
}

</script>

</body>
</html>
